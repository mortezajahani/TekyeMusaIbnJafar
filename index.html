<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تکیه موسی بن جعفر علیه‌السلام</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/iran_nastaliq@master/font-face.css" rel="stylesheet">

<style>

:root{
    --gold:#d4af37;
    --gold-light:#f6dfa0;
    --bg:#030303;
    --text:#f5f2ea;
    --green:#10261c;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:'Vazirmatn',sans-serif;
}

/* لوگوی محو شده برای هاله نور */

.background-glow{
    position:fixed;
    inset:0;
    background:url("tekye (3).png") center center / min(95vw,95vh) no-repeat;
    filter:
        blur(120px)
        brightness(2.2)
        saturate(1.3);
    opacity:.38;
    transform:scale(1.25);
    z-index:1;
    animation:glowPulse 10s ease-in-out infinite;
}

/* لوگوی اصلی در بک گراند */

.background-logo{
    position:fixed;
    inset:0;
    background:url("tekye (3).png") center center / min(88vw,88vh) no-repeat;
    opacity:.12;
    z-index:2;
}

/* لایه تاریک لوکس */

.overlay{
    position:fixed;
    inset:0;
    z-index:3;

    background:
        radial-gradient(
            circle at center,
            rgba(212,175,55,.05) 0%,
            rgba(15,35,25,.08) 35%,
            rgba(0,0,0,.68) 70%,
            rgba(0,0,0,.90) 100%
        );
}

/* ذرات نور خیلی ملایم */

.overlay::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        radial-gradient(circle at 20% 20%, rgba(212,175,55,.05), transparent 14%),
        radial-gradient(circle at 75% 25%, rgba(212,175,55,.04), transparent 16%),
        radial-gradient(circle at 50% 80%, rgba(20,80,40,.05), transparent 18%);
}

/* محتوا */

.content{
    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:20px;
}

/* عنوان نستعلیق */

.title{
    font-family:'IranNastaliq', serif;

    font-size:clamp(4rem,8vw,8rem);

    font-weight:normal;

    line-height:1.6;

    color:var(--gold-light);

    margin-bottom:20px;

    text-shadow:
        0 0 10px rgba(212,175,55,.30),
        0 0 30px rgba(212,175,55,.18),
        0 0 60px rgba(212,175,55,.10);
}

/* زیر عنوان */

.subtitle{
    color:#e7dfcb;

    font-size:clamp(.95rem,1.2vw,1.2rem);

    line-height:2.1;

    margin-bottom:40px;

    max-width:900px;

    text-shadow:0 0 10px rgba(0,0,0,.5);
}

/* دکمه ها */

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    text-decoration:none;

    color:white;

    padding:14px 30px;

    border-radius:999px;

    border:1px solid rgba(212,175,55,.35);

    background:
        linear-gradient(
            135deg,
            rgba(16,38,28,.85),
            rgba(10,10,10,.92)
        );

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 20px rgba(212,175,55,.08);

    transition:.35s ease;

    font-weight:600;
}

.btn:hover{

    transform:translateY(-3px);

    border-color:rgba(212,175,55,.8);

    box-shadow:
        0 0 25px rgba(212,175,55,.25),
        0 0 50px rgba(212,175,55,.12);
}

/* فوتر */

.footer{

    position:absolute;

    bottom:28px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;

    width:100%;

    padding:0 20px;

    z-index:6;
}

.footer .line1{

    color:#d6c07b;

    font-size:.95rem;

    margin-bottom:6px;
}

.footer .line2{

    color:var(--gold-light);

    font-size:1.15rem;

    font-weight:700;

    text-shadow:
        0 0 12px rgba(212,175,55,.25);
}

@keyframes glowPulse{

    0%,100%{
        transform:scale(1.22);
        opacity:.32;
    }

    50%{
        transform:scale(1.30);
        opacity:.45;
    }
}

@media (max-width:768px){

    .background-logo{
        background-size:100vw;
    }

    .background-glow{
        background-size:105vw;
    }

    .title{
        font-size:4.2rem;
        line-height:1.8;
    }

    .subtitle{
        font-size:.95rem;
        margin-bottom:30px;
        padding:0 10px;
    }

    .btn{
        padding:12px 24px;
        font-size:.92rem;
    }

    .footer{
        bottom:18px;
    }

    .footer .line1{
        font-size:.82rem;
    }

    .footer .line2{
        font-size:1rem;
    }
}

</style>
</head>

<body>

<div class="background-glow"></div>

<div class="background-logo"></div>

<div class="overlay"></div>

<div class="content">

    <h1 class="title">
        تکیه موسی بن جعفر<br>
        علیه‌السلام
    </h1>

    <p class="subtitle">
        بیش از یکصد سال ارادتمندی به آستان مبارک سیدالشهدا علیه‌السلام
    </p>

    <div class="buttons">

        <a
            class="btn"
            href="https://www.aparat.com/TEKYEMUSAIBNJAFAR"
            target="_blank">
            کانال آپارات
        </a>

        <a
            class="btn"
            href="https://rubika.ir/TekyeMusaIbnJafar"
            target="_blank">
            کانال روبیکا
        </a>

    </div>

</div>

<footer class="footer">

    <div class="line1">
        خادمان حضرت اباعبدالله الحسین علیه‌السلام
    </div>

    <div class="line2">
        ما ترکناک یا حسین
    </div>

</footer>

</body>
</html>
