<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تکیه موسی بن جعفر علیه‌السلام</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --gold:#d4af37;
    --gold-light:#f4d97a;
    --green:#0f2a1e;
    --text:#f4f1e8;
    --bg:#040404;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Vazirmatn',sans-serif;
    background:var(--bg);
}

/* هاله محو شده از خود لوگو */
.background-glow{
    position:fixed;
    inset:0;
    background:url("tekye (3).png") center center / min(95vw,95vh) no-repeat;
    filter:
        blur(110px)
        brightness(2)
        saturate(1.2);
    opacity:.35;
    transform:scale(1.25);
    z-index:1;
    animation:glowPulse 8s ease-in-out infinite;
}

/* لوگوی اصلی در بک گراند */
.background-logo{
    position:fixed;
    inset:0;
    background:url("tekye (3).png") center center / min(88vw,88vh) no-repeat;
    opacity:.13;
    z-index:2;
}

/* لایه تیره لوکس */
.overlay{
    position:fixed;
    inset:0;
    background:
        radial-gradient(
            circle at center,
            rgba(212,175,55,.05) 0%,
            rgba(15,42,30,.10) 35%,
            rgba(0,0,0,.65) 70%,
            rgba(0,0,0,.88) 100%
        );
    z-index:3;
}

/* ذرات نور خیلی ظریف */
.overlay::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(212,175,55,.05) 0, transparent 12%),
        radial-gradient(circle at 80% 30%, rgba(212,175,55,.04) 0, transparent 14%),
        radial-gradient(circle at 50% 80%, rgba(15,80,40,.06) 0, transparent 18%);
}

.content{
    position:relative;
    z-index:5;
    height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.title{
    color:var(--gold-light);
    font-size:clamp(2rem,4vw,4rem);
    font-weight:800;
    margin-bottom:18px;
    text-shadow:
        0 0 15px rgba(212,175,55,.35),
        0 0 40px rgba(212,175,55,.15);
}

.subtitle{
    color:#e7dfcb;
    font-size:clamp(.95rem,1.3vw,1.25rem);
    max-width:900px;
    line-height:2;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    text-decoration:none;
    color:white;
    padding:14px 30px;
    border-radius:999px;
    font-weight:600;
    border:1px solid rgba(212,175,55,.35);

    background:
        linear-gradient(
            135deg,
            rgba(18,45,30,.85),
            rgba(10,10,10,.92)
        );

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 20px rgba(212,175,55,.08);

    transition:.35s ease;
}

.btn:hover{
    transform:translateY(-3px);

    border-color:rgba(212,175,55,.8);

    box-shadow:
        0 0 20px rgba(212,175,55,.25),
        0 0 50px rgba(212,175,55,.15);
}

.footer{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    width:100%;
    padding:0 20px;
}

.footer .line1{
    color:#d9c27d;
    font-size:.95rem;
    margin-bottom:6px;
}

.footer .line2{
    color:var(--gold-light);
    font-size:1.1rem;
    font-weight:700;

    text-shadow:
        0 0 12px rgba(212,175,55,.3);
}

@keyframes glowPulse{
    0%,100%{
        transform:scale(1.22);
        opacity:.30;
    }
    50%{
        transform:scale(1.28);
        opacity:.42;
    }
}

@media(max-width:768px){

    .background-logo{
        background-size:95vw;
    }

    .background-glow{
        background-size:100vw;
    }

    .title{
        font-size:1.9rem;
        line-height:1.8;
    }

    .subtitle{
        font-size:.95rem;
        margin-bottom:28px;
    }

    .btn{
        padding:12px 24px;
        font-size:.92rem;
    }

    .footer{
        bottom:20px;
    }
}
</style>
</head>

<body>

<div class="background-glow"></div>
<div class="background-logo"></div>
<div class="overlay"></div>

<div class="content">

    <h1 class="title">
        تکیه موسی بن جعفر علیه‌السلام
    </h1>

    <p class="subtitle">
        بیش از یکصد سال ارادتمندی به آستان مبارک سیدالشهدا علیه‌السلام
    </p>

    <div class="buttons">

        <a
            class="btn"
            href="https://www.aparat.com/TEKYEMUSAIBNJAFAR"
            target="_blank">
            کانال آپارات
        </a>

        <a
            class="btn"
            href="https://rubika.ir/TekyeMusaIbnJafar"
            target="_blank">
            کانال روبیکا
        </a>

    </div>

</div>

<footer class="footer">

    <div class="line1">
        خادمان حضرت اباعبدالله الحسین علیه‌السلام
    </div>

    <div class="line2">
        ما ترکناک یا حسین
    </div>

</footer>

</body>
</html>
