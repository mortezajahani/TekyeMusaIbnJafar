<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تکیه موسی بن جعفر علیه السلام</title>

<meta name="description"
content="بیش از صد سال محفل ارادتمندی به سیدالشهداء علیه السلام در دهه اول محرم">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Vazirmatn',sans-serif;
background:#050505;
color:#e7c88c;
overflow-x:hidden;
min-height:100vh;
}

.hero{

position:relative;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:#050505;
}

.hero::before{

content:"";

position:absolute;
inset:0;

background:url('hero.jpg') center center no-repeat;
background-size:cover;

filter:
blur(12px)
brightness(.35);

transform:scale(1.08);

}

.hero::after{

content:"";

position:absolute;
inset:0;

background:
radial-gradient(circle at center,
rgba(0,0,0,0) 0%,
rgba(0,0,0,.15) 35%,
rgba(0,0,0,.8) 100%);

}

.content{

position:relative;
z-index:10;

width:min(900px,90%);

text-align:center;
}

.poster{

width:min(700px,90%);
display:block;
margin:auto;

filter:
drop-shadow(0 0 30px rgba(201,168,107,.18))
drop-shadow(0 0 80px rgba(201,168,107,.08));

}

.subtitle{

margin-top:25px;

font-size:1.15rem;
font-weight:500;

line-height:2.2;

color:#d7b678;
}

.divider{

width:240px;
height:1px;

margin:30px auto;

background:
linear-gradient(
90deg,
transparent,
#c9a86b,
transparent
);

}

.buttons{

display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;

margin-top:20px;
}

.btn{

display:inline-flex;

align-items:center;
justify-content:center;

min-width:250px;

padding:18px 28px;

text-decoration:none;

border-radius:18px;

font-weight:700;

transition:.3s;
}

.btn-aparat{

background:linear-gradient(
135deg,
#8f6a2f,
#e5c88f
);

color:#111;
}

.btn-rubika{

border:1px solid #c9a86b;

color:#e5c88f;

background:rgba(255,255,255,.02);
}

.btn:hover{

transform:translateY(-4px);

}

.footer{

position:absolute;

bottom:35px;
left:0;
right:0;

z-index:10;

text-align:center;

padding:0 20px;
}

.footer p{

color:#b99658;

font-size:.95rem;

line-height:2;
}

@media(max-width:768px){

.poster{

width:95%;
}

.btn{

width:100%;
}

.footer{

position:relative;
margin-top:40px;
padding-bottom:30px;
}

}

</style>

</head>
<body>

<section class="hero">

<div class="content">

<img
src="hero.jpg"
alt="تکیه موسی بن جعفر علیه السلام"
class="poster">

<div class="subtitle">
بیش از صد سال محفل ارادتمندی به سیدالشهداء علیه السلام در دهه اول محرم
</div>

<div class="divider"></div>

<div class="buttons">

<a
href="https://www.aparat.com/TEKYEMUSAIBNJAFAR"
target="_blank"
class="btn btn-aparat">

کانال آپارات

</a>

<a
href="https://rubika.ir/TekyeMusaIbnJafar"
target="_blank"
class="btn btn-rubika">

کانال روبیکا

</a>

</div>

</div>

<div class="footer">

<p>
خادمان حضرت اباعبدالله الحسین علیه السلام
</p>

<p>
ما ترکناک یا حسین
</p>

</div>

</section>

</body>
</html>
