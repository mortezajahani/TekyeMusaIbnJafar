<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تکیه موسی بن جعفر علیه‌السلام</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --gold:#d4af37;
    --gold-soft:#f2d57b;
    --green:#0f2a1e;
    --green-light:#1f4d37;
    --bg:#050505;
    --text:#f4f1e8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Vazirmatn',sans-serif;
    background:
        radial-gradient(circle at center,
        rgba(18,55,35,.35) 0%,
        rgba(9,20,14,.15) 25%,
        rgba(5,5,5,1) 70%);
    color:var(--text);
}

body{
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at center,
    rgba(212,175,55,.08),
    transparent 45%);
    pointer-events:none;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2vh 4vw;
    position:relative;
    z-index:2;
}

.title{
    font-size:clamp(1.7rem,2.8vw,3rem);
    font-weight:800;
    color:var(--gold-soft);
    text-shadow:
        0 0 10px rgba(212,175,55,.25),
        0 0 25px rgba(212,175,55,.15);
    margin-bottom:.6rem;
    line-height:1.5;
}

.subtitle{
    font-size:clamp(.85rem,1.1vw,1.1rem);
    color:#d8d0be;
    opacity:.92;
    margin-bottom:1.2rem;
    line-height:2;
}

.logo-wrapper{
    position:relative;
    width:min(70vw,70vh);
    height:min(70vw,70vh);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:.5rem 0 1rem;
}

.logo-halo{
    position:absolute;
    width:120%;
    height:120%;
    object-fit:contain;
    filter:
        blur(55px)
        brightness(1.4)
        drop-shadow(0 0 40px rgba(212,175,55,.8))
        drop-shadow(0 0 90px rgba(212,175,55,.45));
    opacity:.42;
    animation:haloPulse 7s ease-in-out infinite;
    pointer-events:none;
}

.logo-main{
    position:relative;
    width:100%;
    height:100%;
    object-fit:contain;
    filter:
        drop-shadow(0 0 18px rgba(212,175,55,.35))
        drop-shadow(0 0 45px rgba(212,175,55,.18));
    animation:floatLogo 8s ease-in-out infinite;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:.5rem;
}

.btn{
    text-decoration:none;
    color:#fff;
    padding:12px 26px;
    border-radius:999px;
    border:1px solid rgba(212,175,55,.35);
    background:
        linear-gradient(135deg,
        rgba(25,55,40,.85),
        rgba(10,10,10,.92));
    backdrop-filter:blur(10px);
    transition:.35s;
    font-weight:600;
    box-shadow:
        0 0 15px rgba(212,175,55,.08);
}

.btn:hover{
    transform:translateY(-2px);
    border-color:rgba(212,175,55,.8);
    box-shadow:
        0 0 20px rgba(212,175,55,.18),
        0 0 40px rgba(212,175,55,.12);
}

.footer{
    position:absolute;
    bottom:22px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    width:100%;
    padding:0 15px;
}

.footer .line1{
    color:#d7c38a;
    font-size:clamp(.82rem,.95vw,1rem);
    margin-bottom:4px;
}

.footer .line2{
    color:var(--gold-soft);
    font-size:clamp(.9rem,1.05vw,1.1rem);
    font-weight:700;
    text-shadow:0 0 12px rgba(212,175,55,.25);
}

@keyframes haloPulse{
    0%,100%{
        transform:scale(1);
        opacity:.38;
    }
    50%{
        transform:scale(1.05);
        opacity:.52;
    }
}

@keyframes floatLogo{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

@media (max-width:768px){

    .container{
        padding:2vh 5vw 10vh;
    }

    .logo-wrapper{
        width:72vw;
        height:72vw;
        max-width:520px;
        max-height:520px;
    }

    .subtitle{
        max-width:95%;
    }

    .btn{
        padding:11px 22px;
        font-size:.92rem;
    }
}

@media (max-height:700px){

    .title{
        margin-bottom:.3rem;
    }

    .subtitle{
        margin-bottom:.5rem;
    }

    .logo-wrapper{
        width:min(62vw,55vh);
        height:min(62vw,55vh);
    }
}
</style>
</head>

<body>

<div class="container">

    <h1 class="title">
        تکیه موسی بن جعفر علیه‌السلام
    </h1>

    <p class="subtitle">
        بیش از یکصد سال ارادتمندی به آستان مبارک سیدالشهدا علیه‌السلام
    </p>

    <div class="logo-wrapper">

        <!-- نسخه محو برای هاله نور -->
        <img
            src="tekye (3).png"
            alt="لوگو تکیه موسی بن جعفر"
            class="logo-halo">

        <!-- نسخه اصلی لوگو -->
        <img
            src="tekye (3).png"
            alt="لوگو تکیه موسی بن جعفر"
            class="logo-main">

    </div>

    <div class="buttons">
        <a class="btn"
           href="https://www.aparat.com/TEKYEMUSAIBNJAFAR"
           target="_blank"
           rel="noopener">
            کانال آپارات
        </a>

        <a class="btn"
           href="https://rubika.ir/TekyeMusaIbnJafar"
           target="_blank"
           rel="noopener">
            کانال روبیکا
        </a>
    </div>

</div>

<footer class="footer">
    <div class="line1">
        خادمان حضرت اباعبدالله الحسین علیه‌السلام
    </div>
    <div class="line2">
        ما ترکناک یا حسین
    </div>
</footer>

<script>
document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 6;
    const y = (e.clientY / window.innerHeight - 0.5) * 6;

    document.querySelector('.logo-main').style.transform =
        `translate(${x * 0.4}px, ${y * 0.4}px)`;

    document.querySelector('.logo-halo').style.transform =
        `translate(${x * 0.8}px, ${y * 0.8}px)`;
});
</script>

</body>
</html>
